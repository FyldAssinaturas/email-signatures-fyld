<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assinaturas FYLD</title>
<style>
  html,body{margin:0;background:#f6f6f6;color:#000;font-family:Mogno,Arial,Helvetica,sans-serif}
  .wrap{max-width:1100px;margin:24px auto;padding:20px}
  .card{background:#fff;border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,.06);padding:18px}
  .grid{display:grid;grid-template-columns:360px 1fr;gap:18px}
  @media (max-width:900px){.grid{grid-template-columns:1fr}}
  h1{font-size:20px;margin:0 0 12px}
  label{display:block;font-size:13px;margin:8px 0 4px;color:#333}
  input[type="text"],input[type="tel"],select{
    width:100%;
    padding:10px 12px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    color:#000;
    background:#fff;
  }
  input.placeholder{color:#999;}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  button{cursor:pointer;border:0;border-radius:12px;padding:12px 16px;font-weight:600;background:#000;color:#fff}
  button.secondary{background:#111;opacity:.85}
  .sig-outer{background:#fff;padding:16px;border:1px dashed #ddd;border-radius:12px;overflow:auto;min-height:140px}
  .tip{font-size:12px;color:#666;margin-top:8px}
</style>
</head>

<body>
<div class="wrap">
  <h1>Assinaturas FYLD</h1>

  <div class="grid card">
    <div>
      <label>Nome</label>
      <input id="nome" type="text" value="Nome">

      <label>Cargo</label>
      <input id="cargo" type="text" value="Cargo">

      <label>TM (com indicativo)</label>
      <input id="tm" type="tel" value="(+351) 934 000 000">

      <label>Morada</label>
      <select id="office">
        <option value="lisboa">Lisboa</option>
        <option value="porto">Porto</option>
      </select>

      <div class="row" style="margin-top:14px">
        <button id="copyBtn">Copiar assinatura</button>
        <button id="linkBtn" class="secondary">Copiar link da assinatura</button>
      </div>

      <p class="tip">FYLD</p>
    </div>

    <div>
      <div class="sig-outer"><div id="signaturePreview"></div></div>
    </div>
  </div>
</div>

<script>
const RAW  = `https://www.fyld.pt/signatures/`;
const LINKS = {
  instagram: "https://www.instagram.com/mainfyld/",
  linkedin:  "https://www.linkedin.com/company/fyld/",
  website:   "https://www.fyld.pt/"
};

const ADDRESSES = {
  lisboa: {
    line1: "Rua&nbsp;Actor&nbsp;Taborda,&nbsp;27,&nbsp;3º&nbsp;Piso",
    line2: "1000-007&nbsp;Lisboa"
  },
  porto: {
    line1: "Rua&nbsp;de&nbsp;Augusto&nbsp;Rosa&nbsp;79",
    line2: "4000-098&nbsp;Porto"
  }
};

const esc = s => (s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const NB = s => (s||"").replace(/\s/g,'&nbsp;');

function buildSignatureHTML({nome, cargo, tm, office}){
  const logo = RAW + "fyld-logo.png";
  const iso  = RAW + "certificacao-iso.png";
  const iconWeb = RAW + "icon-website.png";
  const iconIn  = RAW + "icon-linkedin.png";
  const iconIg  = RAW + "icon-instagram.png";

  const LOGO_W  = 340;
  const SIDE_W  = 64;
  const ISO_W   = 56;
  const LABEL_W = 16;
  const OUTER_W = LOGO_W + SIDE_W + 10;
  const hasTm   = !!(tm && tm.trim());
  const address = ADDRESSES[office] || ADDRESSES.lisboa;

  return `
  <table cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td>
        <table style="font-family:Mogno,Arial,Helvetica,sans-serif;color:#000;font-size:14px;line-height:1.2;">
          
          <tr>
            <td>
              <img src="${logo}" width="${LOGO_W}">
            </td>
            <td style="padding-left:14px;">
              <img src="${iso}" width="${ISO_W}">
            </td>
          </tr>

          <tr>
            <td style="padding-top:12px;">
              <div style="font-size:22px;font-weight:800;white-space:nowrap;">
                ${esc(nome)}
              </div>
              <div style="font-size:11px;white-space:nowrap;">
                ${esc(cargo).toUpperCase()}
              </div>
            </td>

            <td style="padding-left:20px;font-size:10px;">

              ${
                hasTm
                ? `<div><strong>TM</strong> ${NB(esc(tm))}</div>`
                : ``
              }

              <div>${address.line1}</div>
              <div>${address.line2}</div>

              <div style="margin-top:4px;">
                <strong>T</strong> (+351)&nbsp;213&nbsp;520&nbsp;895
              </div>

              <div>
                <a href="${LINKS.website}" style="color:#000;text-decoration:none;font-weight:700;">
                  fyld.pt
                </a>
              </div>

            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>`;
}

const $nome = document.getElementById('nome');
const $cargo= document.getElementById('cargo');
const $tm   = document.getElementById('tm');
const $office = document.getElementById('office');
const $prev = document.getElementById('signaturePreview');

[$nome,$cargo,$tm].forEach(el => el.dataset.default = el.value);

function getEffectiveValue(el){
  const v = el.value || '';
  const d = el.dataset.default || '';
  return (!v.trim() || v===d) ? '' : v;
}

function updateInputStyles(){
  [$nome,$cargo,$tm].forEach(el=>{
    const v=el.value||'', d=el.dataset.default||'';
    (!v.trim()||v===d) ? el.classList.add('placeholder') : el.classList.remove('placeholder');
  });
}

function buildSignatureLink(){
  const qs=new URLSearchParams({
    view:'signature',
    nome:getEffectiveValue($nome),
    cargo:getEffectiveValue($cargo),
    tm:getEffectiveValue($tm),
    office:$office.value
  });
  return `${location.origin}${location.pathname}?${qs}`;
}

function render(){
  updateInputStyles();
  $prev.innerHTML = buildSignatureHTML({
    nome:getEffectiveValue($nome),
    cargo:getEffectiveValue($cargo),
    tm:getEffectiveValue($tm),
    office:$office.value
  });
}

[$nome,$cargo,$tm,$office].forEach(el=>el.addEventListener('input',render));
$office.addEventListener('change',render);
render();

document.getElementById('copyBtn').onclick=async()=>{
  const html=buildSignatureHTML({
    nome:getEffectiveValue($nome),
    cargo:getEffectiveValue($cargo),
    tm:getEffectiveValue($tm),
    office:$office.value
  });
  await navigator.clipboard.write([
    new ClipboardItem({"text/html":new Blob([html],{type:"text/html"})})
  ]);
  alert('Assinatura copiada! ✨');
};

document.getElementById('linkBtn').onclick=async()=>{
  const link=buildSignatureLink();
  await navigator.clipboard.writeText(link);
  alert('Link copiado! ✨');
};

if(new URLSearchParams(location.search).get('view')==='signature'){
  const p=new URLSearchParams(location.search);
  document.body.innerHTML=buildSignatureHTML({
    nome:p.get('nome')||'',
    cargo:p.get('cargo')||'',
    tm:p.get('tm')||'',
    office:p.get('office')||'lisboa'
  });
}
</script>
</body>
</html>
