<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assinaturas FYLD</title>
<style>
  html,body{margin:0;background:#f6f6f6;color:#000;font-family:Mogno,Arial,Helvetica,sans-serif}
  .wrap{max-width:1100px;margin:24px auto;padding:20px}
  .card{background:#fff;border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,.06);padding:18px}
  .grid{display:grid;grid-template-columns:360px 1fr;gap:18px}
  @media (max-width:900px){.grid{grid-template-columns:1fr}}
  h1{font-size:20px;margin:0 0 12px}
  label{display:block;font-size:13px;margin:8px 0 4px;color:#333}
  input[type="text"],input[type="tel"],select{
    width:100%;
    padding:10px 12px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    color:#000;
    background:#fff;
  }
  input.placeholder{
    color:#999;
  }
  .row{display:flex;gap:10px;flex-wrap:wrap}
  button{cursor:pointer;border:0;border-radius:12px;padding:12px 16px;font-weight:600;background:#000;color:#fff}
  button.secondary{background:#111;opacity:.85}
  .sig-outer{background:#fff;padding:16px;border:1px dashed #ddd;border-radius:12px;overflow:auto;min-height:140px}
  .tip{font-size:12px;color:#666;margin-top:8px}
  .error{background:#fff3f3;border:1px solid #e99;border-radius:10px;padding:10px;color:#900;font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,"Liberation Mono","Courier New", monospace}
</style>
</head>

<body>
<div class="wrap">
  <h1>Assinaturas FYLD</h1>

  <div class="grid card">
    <div>
      <label>Nome</label>
      <input id="nome" type="text" value="Nome">

      <label>Cargo</label>
      <input id="cargo" type="text" value="Cargo">

      <label>TM (com indicativo)</label>
      <input id="tm" type="tel" value="(+351) 934 000 000">

      <label>Morada</label>
      <select id="office">
        <option value="lisboa" selected>Lisboa</option>
        <option value="porto">Porto</option>
      </select>

      <div class="row" style="margin-top:14px">
        <button id="copyBtn">Copiar assinatura</button>
        <button id="linkBtn" class="secondary">Copiar link da assinatura</button>
      </div>

      <p class="tip">FYLD</p>
    </div>

    <div>
      <div class="sig-outer"><div id="signaturePreview"></div></div>
    </div>
  </div>
</div>

<script>
const RAW  = `https://www.fyld.pt/signatures/`;
const LINKS = {
  instagram: "https://www.instagram.com/mainfyld/",
  linkedin:  "https://www.linkedin.com/company/fyld/",
  website:   "https://www.fyld.pt/"
};

const ADDRESSES = {
  lisboa: {
    line1: "Rua&nbsp;Actor&nbsp;Taborda,&nbsp;27,&nbsp;3º&nbsp;Piso",
    line2: "1000-007&nbsp;Lisboa"
  },
  porto: {
    line1: "Rua&nbsp;de&nbsp;Augusto&nbsp;Rosa&nbsp;79",
    line2: "4000-098&nbsp;Porto"
  }
};

const esc = s => (s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const NB = s => (s||"").replace(/\s/g,'&nbsp;');

function buildSignatureHTML({nome, cargo, tm, office}){
  const logo = RAW + "fyld-logo.png";
  const iso  = RAW + "certificacao-iso.png";
  const iconWeb = RAW + "icon-website.png";
  const iconIn  = RAW + "icon-linkedin.png";
  const iconIg  = RAW + "icon-instagram.png";

  const LOGO_W  = 340;
  const SIDE_W  = 64;
  const ISO_W   = 56;
  const LABEL_W = 16;
  const OUTER_W = LOGO_W + SIDE_W + 10;
  const hasTm   = !!(tm && tm.trim());
  const address = ADDRESSES[office] || ADDRESSES.lisboa;

  const inner = `
  <table role="presentation" cellpadding="0" cellspacing="0" border="0"
         style="width:${OUTER_W}px;max-width:100%;
                font-family:Mogno,Arial,Helvetica,sans-serif;color:#000;
                font-size:14px;line-height:1.2;margin:0;border-collapse:collapse;">

    <tr>
      <td style="vertical-align:top;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0"
               style="width:${LOGO_W+SIDE_W}px;border-collapse:collapse;">

          <!-- LOGO + ISO -->
          <tr>
            <td style="vertical-align:middle;width:${LOGO_W}px;">
              <img src="${logo}" alt="FYLD" width="${LOGO_W}"
                   style="display:block;max-width:100%;height:auto;border:0;margin:0;">
            </td>
            <td style="vertical-align:middle;padding-left:14px;width:${SIDE_W}px;">
              <img src="${iso}" alt="ISO/IEC 27001 Certified" width="${ISO_W}"
                   style="display:block;height:auto;border:0;margin:0;">
            </td>
          </tr>

          <!-- NOME + DETALHES -->
          <tr>
            <td style="vertical-align:top;padding-top:12px;width:${LOGO_W}px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0"
                     style="width:${LOGO_W}px;border-collapse:collapse;">

                <tr>
                  <!-- Nome -->
                  <td style="vertical-align:top;">
                    <div style="font-size:22px;line-height:26px;font-weight:800;
                                white-space:nowrap;max-width:none;">
                      ${esc(nome)}
                    </div>
                    <div style="font-size:11px;line-height:15px;margin-top:2px;white-space:nowrap;">
                      ${esc(cargo).toUpperCase()}
                    </div>
                  </td>

                  <!-- Contactos -->
                  <td style="vertical-align:top;padding-left:10px;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0"
                           style="font-size:10px;line-height:14px;border-collapse:collapse;">

                      ${
                        hasTm
                          ? `
                      <tr>
                        <td style="width:${LABEL_W}px;font-weight:700;padding-right:4px;">TM</td>
                        <td style="white-space:nowrap;">${NB(esc(tm))}</td>
                      </tr>

                      <tr><td colspan="2" style="height:4px;"></td></tr>
                            `
                          : ``
                      }

                      <tr>
                        <td>&nbsp;</td>
                        <td style="white-space:nowrap;">${address.line1}</td>
                      </tr>

                      <tr>
                        <td>&nbsp;</td>
                        <td style="white-space:nowrap;">${address.line2}</td>
                      </tr>

                      <tr><td colspan="2" style="height:4px;"></td></tr>

                      <tr>
                        <td style="font-weight:700;">T</td>
                        <td style="white-space:nowrap;">(+351)&nbsp;213&nbsp;520&nbsp;895</td>
                      </tr>

                      <tr>
                        <td>&nbsp;</td>
                        <td>
                          <a href="${LINKS.website}"
                             style="color:#000;text-decoration:none;font-weight:700;">
                            fyld.pt
                          </a>
                        </td>
                      </tr>

                    </table>
                  </td>
                </tr>

              </table>
            </td>

            <!-- Icons -->
            <td style="vertical-align:top;padding-top:4px;padding-left:18px;width:${SIDE_W}px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">

                <tr><td style="padding-bottom:4px;">
                  <a href="${LINKS.website}">
                    <img src="${iconWeb}" width="22" height="22" style="display:block;">
                  </a>
                </td></tr>

                <tr><td style="padding-bottom:4px;">
                  <a href="${LINKS.linkedin}">
                    <img src="${iconIn}" width="22" height="22" style="display:block;">
                  </a>
                </td></tr>

                <tr><td>
                  <a href="${LINKS.instagram}">
                    <img src="${iconIg}" width="22" height="22" style="display:block;">
                  </a>
                </td></tr>

              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>

  </table>`;

  return `
  <table cellpadding="0" cellspacing="0" border="0">
    <tr><td>${inner}</td></tr>
  </table>`;
}

// resto do JS igual (não alterado)
</script>
</body>
</html>
